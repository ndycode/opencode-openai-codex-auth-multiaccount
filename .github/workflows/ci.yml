name: CI

on:
  push:
    branches:
      - main
      - "audit/**"
      - "feature/**"
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit Tests
        run: npm test

      - name: Coverage
        run: npm run coverage

      - name: Audit Gates
        run: npm run audit:ci
