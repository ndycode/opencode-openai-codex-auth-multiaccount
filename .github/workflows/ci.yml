name: CI

on:
  pull_request:
  push:
    branches:
      - main
  merge_group:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: true
  HUSKY: 0

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ steps.detect.outputs.code_changed }}
      docs_changed: ${{ steps.detect.outputs.docs_changed }}
      workflow_changed: ${{ steps.detect.outputs.workflow_changed }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: detect
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          docs_changed=false
          code_changed=false
          workflow_changed=false
          files=()

          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            git fetch --no-tags --depth=1 origin "${BASE_REF}"
            while IFS= read -r file; do
              files+=("${file}")
            done < <(git diff --name-only "origin/${BASE_REF}...HEAD")
          elif [[ "${EVENT_NAME}" == "push" && -n "${BEFORE_SHA}" && "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
            while IFS= read -r file; do
              files+=("${file}")
            done < <(git diff --name-only "${BEFORE_SHA}...HEAD")
          else
            while IFS= read -r file; do
              files+=("${file}")
            done < <(git ls-files)
          fi

          for file in "${files[@]}"; do
            [[ -z "${file}" ]] && continue

            case "${file}" in
              README.md|CONTRIBUTING.md|CHANGELOG.md|SECURITY.md|config/README.md|docs/**|test/README.md|.github/*.md|.github/ISSUE_TEMPLATE/*.md)
                docs_changed=true
                ;;
            esac

            case "${file}" in
              .github/workflows/**)
                workflow_changed=true
                code_changed=true
                ;;
              README.md|CONTRIBUTING.md|CHANGELOG.md|SECURITY.md|config/README.md|docs/**|test/README.md|.github/*.md|.github/ISSUE_TEMPLATE/*.md)
                ;;
              *)
                code_changed=true
                ;;
            esac
          done

          if [[ "${EVENT_NAME}" != "pull_request" ]]; then
            docs_changed=true
            code_changed=true
          fi

          {
            echo "docs_changed=${docs_changed}"
            echo "code_changed=${code_changed}"
            echo "workflow_changed=${workflow_changed}"
          } >> "${GITHUB_OUTPUT}"

  validate:
    name: validate
    needs: changes
    if: needs.changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

  docs-sanity:
    name: docs-sanity
    needs: changes
    if: needs.changes.outputs.docs_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Verify markdown links and CI badge targets
        run: npm run docs:check

  actionlint:
    name: actionlint
    needs: changes
    if: needs.changes.outputs.workflow_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Lint GitHub Actions workflows
        uses: docker://rhysd/actionlint:1.7.11
        with:
          args: -color

  required-pr:
    name: required-pr
    needs:
      - changes
      - validate
      - docs-sanity
      - actionlint
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate required checks
        shell: bash
        env:
          CODE_CHANGED: ${{ needs.changes.outputs.code_changed }}
          DOCS_CHANGED: ${{ needs.changes.outputs.docs_changed }}
          WORKFLOW_CHANGED: ${{ needs.changes.outputs.workflow_changed }}
          VALIDATE_RESULT: ${{ needs.validate.result }}
          DOCS_RESULT: ${{ needs.docs-sanity.result }}
          ACTIONLINT_RESULT: ${{ needs.actionlint.result }}
        run: |
          set -euo pipefail
          failures=()

          if [[ "${CODE_CHANGED}" == "true" && "${VALIDATE_RESULT}" != "success" ]]; then
            failures+=("validate")
          fi

          if [[ "${DOCS_CHANGED}" == "true" && "${DOCS_RESULT}" != "success" ]]; then
            failures+=("docs-sanity")
          fi

          if [[ "${WORKFLOW_CHANGED}" == "true" && "${ACTIONLINT_RESULT}" != "success" ]]; then
            failures+=("actionlint")
          fi

          if [[ ${#failures[@]} -gt 0 ]]; then
            echo "Required checks failed: ${failures[*]}"
            exit 1
          fi

          echo "All required PR checks passed."
